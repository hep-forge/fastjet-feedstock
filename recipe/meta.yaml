{% set name = "fastjet" %}
{% set versions = {
    "3.5.1": "9a4154163e72041dee3fdde9cb24e814625e178091a8734a6ad5375e5371b423"
} %}


{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

package:
  name: {{ environ.get('ANACONDA_PACKAGE', name)|string|lower }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://fastjet.fr/repo/fastjet-{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  # Export an exact-match pin on this package to anything built against it
  # (e.g. fastjet-contrib). Without this, a consumer recipe that just lists
  # `fastjet` unpinned in `host`/`run` can be solved against a *different*
  # channel's fastjet build at install time (e.g. conda-forge's fastjet-cxx),
  # which is ABI-incompatible with this hep-forge build and breaks at
  # runtime with undefined-symbol errors in fastjet-contrib. Pinning exact
  # (version + build string) guarantees anything depending on this fastjet
  # can only ever resolve against this exact hep-forge build.
  run_exports:
    - {{ pin_subpackage(name, exact=True) }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}

    - make

  host:
    - python
    - boost
    - mpfr
    - gmp
    - swig
    - autoconf
    - libtool

  run:
    - python

about:
  home: "https://fastjet.fr"
  license: "GPL-2.0"
  summary: "A software package for jet finding in pp and e+e− collisions. "
  description: |
    A software package for jet finding in pp and e+e− collisions. It includes fast native implementations of many sequential recombination clustering algorithms, plugins for access to a range of cone jet finders and tools for advanced jet manipulation.

extra:
  recipe-maintainers:
    - meiyasan
